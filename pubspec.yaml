name: plantpulse
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  rive: ^0.13.4
  
  # Firebase dependencies
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.4
  firebase_messaging: ^15.0.0
  
  # Media handling
  image_picker: ^1.0.0
  
  # Weather dependencies
  http: ^1.1.0
  
  # UI Enhancement dependencies
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  lottie: ^3.1.2
  flutter_animate: ^4.5.0
  flutter_svg: ^2.0.10
  shimmer: ^3.0.0
  flutter_local_notifications: ^17.0.0
  
  # Additional dependencies for watering system
  intl: ^0.18.1
  fl_chart: ^0.68.0
  timezone: ^0.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
    - assets/animations/
    - assets/animations/plant_login.riv
    - assets/images/plant_3d.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
